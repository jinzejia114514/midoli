      <div id="audio-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);color:white;display:flex;align-items:center;justify-content:center;z-index:9999;cursor:pointer;font-family:sans-serif;">

      <script>
          document.getElementById('audio-overlay').addEventListener('click', function () {
              this.remove();
              // 尝试恢复/播放所有音频上下文
